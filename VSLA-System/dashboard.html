<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="sidebar">
      <h3>SmartSACCO</h3>

      <ul>
        <li><a href="members.html">Members</a></li>
        <li><a href="savings.html">Savings</a></li>
        <li><a href="loans.html">Loans</a></li>
        <li><a href="repayments.html">Repayments</a></li>
        <li><a href="reports.html">Reports</a></li>
      </ul>
    </div>

    <div class="main-content">
      <div class="topbar">
        <h2>Dashboard</h2>

        <a href="login.html" class="btn btn-danger"> Logout </a>
      </div>

      <div class="row mt-4">
        <div class="col-md-3">
          <div class="dashboard-card">
            <h5>Total Members</h5>

            <h2>245</h2>
          </div>
        </div>

        <div class="col-md-3">
          <div class="dashboard-card">
            <h5>Total Savings</h5>

            <h2>UGX 20M</h2>
          </div>
        </div>

        <div class="col-md-3">
          <div class="dashboard-card">
            <h5>Total Loans</h5>

            <h2>UGX 15M</h2>
          </div>
        </div>

        <div class="col-md-3">
          <div class="dashboard-card">
            <h5>Repayments</h5>

            <h2>UGX 9M</h2>
          </div>
        </div>
      </div>

      <div class="card mt-4 p-4">
        <h4>Recent Transactions</h4>

        <table class="table">
          <thead>
            <tr>
              <th>Member</th>
              <th>Activity</th>
              <th>Amount</th>
              <th>Date</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>John Doe</td>
              <td>Saving</td>
              <td>50,000</td>
              <td>08/06/2026</td>
            </tr>

            <tr>
              <td>Sarah</td>
              <td>Loan</td>
              <td>500,000</td>
              <td>08/06/2026</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
